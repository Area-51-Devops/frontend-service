server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Serve files; fallback to index.html for SPA routes
  location / {
    try_files $uri /index.html;
  }

  # API Gateway Proxies
  location /api/user/ { proxy_pass http://user-service:3001/; }
  location /api/account/ { proxy_pass http://account-service:3002/; }
  location /api/tx/ { proxy_pass http://transaction-service:3003/; }
  location /api/payment/ { proxy_pass http://payment-service:3004/; }
  location /api/loan/ { proxy_pass http://loan-service:3005/; }
  location /api/notify/ { proxy_pass http://notification-service:3006/; }
  location /api/report/ { proxy_pass http://reporting-service:3010/; }

  # (Optional) Static assets cache policy
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri /index.html;
  }
}
