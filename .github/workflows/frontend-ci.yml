name: Frontend_CI

# ──────────────────────────────────────────────────────────────────────────────
# Frontend CI — calls each reusable workflow directly (no common-ci.yml).
#
# Execution order:
#   ci-sonar ──┐
#              ├──► ci-image  (only starts when BOTH quality gates pass)
#   ci-snyk  ──┘
#
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    paths:
      - 'frontend/**'
  pull_request:
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:

  # # ── Stage 1a: SonarQube Scan + Quality Gate ──────────────────────────────────
  # ci-sonar:
  #   uses: Area-51-Devops/ci-templates/.github/workflows/ci-sonar.yml@newsep
  #   permissions:
  #     contents: write
  #   with:
  #     working_directory: frontend
  #     sonar_project_key: frontend
  #     service-name: frontend
  #   secrets:
  #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  #     SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ── Stage 1b: Dependency Build + Snyk Scan ───────────────────────────────────
  ci-snyk:
    uses: Area-51-Devops/ci-templates/.github/workflows/ci-snyk.yml@newsep
    permissions:
      contents: write
    with:
      working_directory: frontend
      service-name: frontend
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # ── Stage 2: Build Image · Trivy Scan · Push · Notify ────────────────────────
  # Only starts once BOTH ci-sonar and ci-snyk have passed.
  ci-image:
    needs: [ci-snyk]
    uses: Area-51-Devops/ci-templates/.github/workflows/ci-image.yml@newsep
    permissions:
      contents: write
    with:
      working_directory: frontend
      image_name: frontend
      run_build: true
      docker_context: frontend
      dockerfile_path: Dockerfile
      service-name: frontend
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
